<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SemenRecode — Sign In</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='youth.css') }}?v=8">
</head>
<body>
  <div id="loadingScreen" class="loading-screen">
    <div class="loading-logo"></div>
    <div class="loading-text">Authenticating...</div>
    <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  </div>

  <div class="app app--auth">
    <header>
      <div class="header-content">
        <a class="header-brand-link" href="/">
          <div class="header-logo" aria-hidden="true"></div>
          <span class="header-brand">SemenRecode</span>
        </a>
        <nav class="header-nav" aria-label="Main navigation">
          <a href="/register">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>
            <span>Create Account</span>
          </a>
        </nav>
      </div>
    </header>

    <main class="auth-overlay">
      <form class="auth-form" onsubmit="submitForm(event, '/api/auth/login', '/profile')">
        <div class="auth-logo" aria-hidden="true"></div>
        <div class="auth-view">
          <h2 class="auth-title">Welcome back</h2>
          <p class="auth-subtitle">Sign in to your account.</p>
        </div>
        <div class="message"></div>
        <label class="auth-field">
          <span class="auth-field-icon">@</span>
          <input type="text" name="username" required placeholder="Username" autocomplete="username">
        </label>
        <label class="auth-field">
          <span class="auth-field-icon">*</span>
          <input type="password" name="password" required placeholder="Password" autocomplete="current-password">
        </label>
        <button type="submit" class="auth-submit">Sign In</button>
        <p class="auth-redirect">No account? <a href="/register">Register here</a></p>
      </form>
    </main>
  </div>

  <div class="page-transition" id="pageTransition"></div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
